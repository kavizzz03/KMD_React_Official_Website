          "@type": "OpeningHoursSpecification",

        "https://wa.me/94719057057"

      "makesOffer": [
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Product",
            "name": "Men's Fashion",
            "description": "Premium quality men's wear"
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Product",
            "name": "Women's Fashion",

    <!-- Structured Data - Website Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ASB FASHION",
      "url": "https://asbfashion.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://asbfashion.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "description": "Shop the latest fashion trends at ASB FASHION - Sri Lanka's premier clothing brand"
    }
    </script>
